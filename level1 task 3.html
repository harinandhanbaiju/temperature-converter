<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        :root {
            --primary-blue: #007bff;
            --text-gray: #888;
            --border-light: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-card {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #000;
        }

        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .field {
            flex: 1;
        }

        label {
            display: block;
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-light);
            padding: 8px 0;
            font-size: 1.1rem;
            outline: none;
            background: transparent;
        }

        input:focus {
            border-bottom: 2px solid var(--primary-blue);
        }

        .result-section {
            margin-bottom: 35px;
        }

        #resultDisplay {
            font-size: 1.2rem;
            color: #333;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
            min-height: 1.5rem;
        }

        .convert-btn {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .convert-btn:hover {
            background-color: #0069d9;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Temperature converter</h2>

    <div class="input-group">
        <div class="field">
            <label>Degrees</label>
            <input type="number" id="tempValue" value="72">
        </div>
        <div class="field">
            <label>Type</label>
            <select id="unitType">
                <option value="F">Fahrenheit</option>
                <option value="C">Celsius</option>
                <option value="K">Kelvin</option>
            </select>
        </div>
    </div>

    <div class="result-section">
        <label>Result</label>
        <div id="resultDisplay">22.2222 °C</div>
    </div>

    <button class="convert-btn" onclick="performConversion()">Convert</button>
</div>

<script>
    function performConversion() {
        const val = parseFloat(document.getElementById('tempValue').value);
        const unit = document.getElementById('unitType').value;
        const display = document.getElementById('resultDisplay');

        if (isNaN(val)) {
            display.innerText = "Enter a number";
            display.style.color = "red";
            return;
        }

        display.style.color = "#333";
        let output = "";

        if (unit === "F") {
            let celsius = (val - 32) * 5/9;
            output = `${celsius.toFixed(4)} °C`;
        } else if (unit === "C") {
            let fahrenheit = (val * 9/5) + 32;
            output = `${fahrenheit.toFixed(4)} °F`;
        } else if (unit === "K") {
            let celsius = val - 273.15;
            output = `${celsius.toFixed(4)} °C`;
        }

        display.innerText = output;
    }
</script>

</body>
</html>
